server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/novel_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: WARN
    com.example.novelbackend: INFO

avatar:
  upload:
    path: uploads/avatars/
  access:
    prefix: /avatars/

cover:
  upload:
    path: uploads/covers/
  access:
    prefix: /covers/